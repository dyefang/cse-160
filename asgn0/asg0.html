<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ASG0</title>
</head>

<body onload="main()">
  <canvas id="example" width="400" height="400" style="border:1px solid white;">
    Please use a browser that supports "canvas"
  </canvas>

  <p>
    v1:
    x <input type="number" id="v1x" value="2.25" step="any">
    y <input type="number" id="v1y" value="2.25" step="any">
  </p>

  <p>
    v2:
    x <input type="number" id="v2x" value="1" step="any">
    y <input type="number" id="v2y" value="1" step="any">
  </p>

  <p>
    <button onclick="handleDrawEvent()">Draw</button>
  </p>

  <p>
    Operation:
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Sub</option>
      <option value="mul">Mul</option>
      <option value="div">Div</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle between</option>
      <option value="area">Area</option>
    </select>

    Scalar:
    <input type="number" id="scalar" value="2" step="any">

    <button onclick="handleDrawOperationEvent()">Draw Operation</button>
  </p>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
